# HGA²C Training Hyperparameters
# ===============================
# All RL/training parameters from §6 of the master prompt.
# Never hardcode these inline — always load from this file.

# --- Random seed for reproducibility ---
seed: 42

# --- A2C + GAE parameters (§6.1) ---
gamma: 0.99            # discount factor
lambda_gae: 0.95       # GAE lambda
entropy_coeff: 0.01    # entropy bonus coefficient β
value_loss_coeff: 0.5  # critic loss weight

# --- Optimizer ---
lr_encoder: 1.0e-4     # learning rate for GAT encoder + actor heads
lr_critic: 3.0e-4      # learning rate for critic head
grad_clip: 1.0         # max global gradient norm

# --- GAT Encoder Architecture (§5.1) ---
use_travel_time_bias: true  # Toggle for architecture ablation
d_model: 128           # embedding dimension
n_heads: 8             # attention heads
n_encoder_layers: 3    # number of Transformer-style encoder layers
ff_dim: 512            # feed-forward hidden dimension

# --- Allocation Actor (§5.2) ---
max_swap_per_region: 7       # max possible S̆_r across all instances (padded)
max_relocation_per_pair: 5   # max p_rl per (r,l) pair

# --- Routing Actor (§5.3) ---
lstm_hidden_dim: 128   # LSTM decoder hidden size
pointer_clip: 10.0     # logit clipping for pointer attention (tanh * C)

# --- Critic (§5.4) ---
critic_hidden_dim: 128  # MLP hidden layer size

# --- Training schedule ---
batch_size: 16         # episodes per batch
eval_interval: 100     # evaluate every N batches

# --- Stage 1: Routing warm-start ---
stage1:
  episodes: 20000
  lr_override: 1.0e-4
  min_regions: 4
  max_regions: 9
  min_scooters: 8
  max_scooters: 20

# --- Stage 2: Joint training ---
stage2:
  episodes: 500000
  gradient_accumulation_steps: 32
  penalty_schedule_end_episode: 400000
  lr_override: 1.0e-4
  min_regions: 4
  max_regions: 16
  min_scooters: 10
  max_scooters: 30
  min_vehicles: 1
  max_vehicles: 3

# --- Stage 3: Fine-tuning on target instance ---
stage3:
  episodes: 50000
  gradient_accumulation_steps: 8
  lr_override: 5.0e-5    # reduced LR for fine-tuning
  use_augmentation: true  # 8 grid symmetries (4 rotations × 2 reflections)

# --- Dataset generation (for curriculum + evaluation) ---
dataset:
  stage1_pool_size: 1000    # pre-generate this many instances for Stage 1
  stage2_pool_size: 5000    # pre-generate this many instances for Stage 2
  eval_holdout_size: 50     # held-out test instances for generalization eval
  regen_interval: 0         # 0 = use pre-generated pool; >0 = regen every N batches
